<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petshop Patinhas Felizes - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- R1 - Menu de Navegação Horizontal -->
    <nav class="topo-nav">
        <ul>
            <li><a href="index.html">Página Principal</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <main class="container">
        
        <!-- R7 - Formulário de Contato -->
        <section id="contato">
            <h2>Entre em Contato Conosco</h2>
            
            <form action="#" method="POST" class="form-contato">
                <div class="form-grupo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-grupo">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" required>
                </div>

                <div class="form-grupo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                </div>

                <div class="form-grupo">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Mensagem</button>
            </form>
        </section>

    </main>

    <!-- R8 - Rodapé Comum -->
    <footer class="rodape-principal">
        <div class="rodape-conteudo">
            <p>Contato Fictício: (41) 99999-0000 | contato@patinhasfelizespet.com</p>
            <div class="rodape-redes">
                <a href="#">Facebook</a> | 
                <a href="#">Instagram</a> | 
                <a href="#">WhatsApp</a>
            </div>
        </div>
        <div class="rodape-direitos">
            Todos os direitos reservados. Desenvolvido pela dupla: [Nome 1] e [Nome 2]
        </div>
    </footer>

</body>
</html>
